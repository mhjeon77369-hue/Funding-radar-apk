name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Create simple WebView APK
        run: |
          mkdir -p app/src/main/java/com/fundingradar/app
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          
          # build.gradle
          cat > build.gradle << 'EOF'
          plugins {
            id 'com.android.application' version '8.1.0'
          }
          android {
            namespace 'com.fundingradar.app'
            compileSdk 34
            defaultConfig {
              applicationId "com.fundingradar.app"
              minSdk 21
              targetSdk 34
              versionCode 1
              versionName "1.0"
            }
            buildTypes {
              release {
                minifyEnabled false
              }
            }
          }
          dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          # AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET"/>
            <application android:label="Funding Radar">
              <activity android:name=".MainActivity" android:exported="true">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN"/>
                  <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
              </activity>
            </application>
          </manifest>
          EOF

          # MainActivity.java
          cat > app/src/main/java/com/fundingradar/app/MainActivity.java << 'EOF'
          package com.fundingradar.app;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebView;
          public class MainActivity extends Activity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
              super.onCreate(savedInstanceState);
              WebView webView = new WebView(this);
              webView.getSettings().setJavaScriptEnabled(true);
              webView.loadUrl("https://funding-radar-static.loca.lt/funding-radar");
              setContentView(webView);
            }
          }
          EOF

          # strings.xml
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <string name="app_name">Funding Radar</string>
          </resources>
          EOF

          # settings.gradle
          cat > settings.gradle << 'EOF'
          pluginManagement {
            repositories {
              google()
              mavenCentral()
              gradlePluginPortal()
            }
          }
          dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
              google()
              mavenCentral()
            }
          }
          rootProject.name = "FundingRadar"
          include ':app'
          EOF
      
      - name: Build APK with aapt
        run: |
          # Compile resources
          aapt package -f -m -J app/src/main/java -M app/src/main/AndroidManifest.xml -S app/src/main/res -I $ANDROID_HOME/platforms/android-34/android.jar
          
          # Compile Java
          javac -d app/build/classes -cp $ANDROID_HOME/platforms/android-34/android.jar app/src/main/java/com/fundingradar/app/*.java
          
          # Create DEX
          mkdir -p app/build/dex
          dx --dex --output=app/build/dex/classes.dex app/build/classes
          
          # Package APK
          mkdir -p app/build/apk
          aapt package -f -M app/src/main/AndroidManifest.xml -S app/src/main/res -I $ANDROID_HOME/platforms/android-34/android.jar -F app/build/apk/app-unsigned.apk app/build/classes
          
          # Add DEX to APK
          cd app/build/apk && zip -r app-unsigned.apk ../dex/classes.dex && cd ../../..
          
          # Sign APK (debug key)
          keytool -genkey -v -keystore debug.keystore -keyalg RSA -keysize 2048 -validity 10000 -alias androiddebugkey -keypass android -storepass android -dname "CN=Android Debug,O=Android,C=US" -noprompt 2>/dev/null || true
          jarsigner -verbose -sigalg SHA1withRSA -digestalg SHA1 -keystore debug.keystore -storepass android -keypass android app/build/apk/app-unsigned.apk androiddebugkey
          
          # Align APK
          zipalign -v 4 app/build/apk/app-unsigned.apk app/build/outputs/apk/debug/app-debug.apk || cp app/build/apk/app-unsigned.apk app/build/outputs/apk/debug/app-debug.apk
          mkdir -p app/build/outputs/apk/debug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FundingRadar-v1.0
          path: app/build/outputs/apk/debug/app-debug.apk
